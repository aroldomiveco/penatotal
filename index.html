<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WhatsApp Disqus - Mobile Ready</title>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts para tipografía -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #111b21;
            padding: 8px;
        }

        .whatsapp-container {
            display: flex;
            width: 1400px;
            max-width: 100%;
            height: 95vh;
            background-color: #2a2f32;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Panel izquierdo */
        .sidebar {
            width: 30%;
            background-color: #111b21;
            border-right: 1px solid #2f3b43;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background-color: #202c33;
            color: #b1b3b5;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #6a7175;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .header-icons i {
            margin-left: 25px;
            font-size: 18px;
            cursor: pointer;
        }

        .search-bar {
            padding: 8px 12px;
            background-color: #111b21;
        }

        .search-bar input {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background-color: #202c33;
            color: #d1d7db;
            font-size: 14px;
            outline: none;
        }

        .search-bar input::placeholder {
            color: #8796a1;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #2f3b43;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover, .chat-item.active {
            background-color: #2a3b45;
        }

        .chat-avatar {
            width: 49px;
            height: 49px;
            border-radius: 50%;
            background-color: #00a884;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
            font-size: 18px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            color: #d1d7db;
        }

        .chat-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .chat-message {
            font-size: 13px;
            color: #8796a1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 11px;
            color: #8796a1;
            align-self: flex-start;
            margin-left: 5px;
        }

        /* Panel derecho */
        .chat-panel {
            width: 70%;
            display: flex;
            flex-direction: column;
            background-color: #0b141a;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background-color: #202c33;
            color: #d1d7db;
        }

        .contact-info {
            display: flex;
            align-items: center;
        }

        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #00a884;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .contact-details h4 {
            font-weight: 500;
            font-size: 16px;
        }

        .contact-details p {
            font-size: 13px;
            color: #8796a1;
        }

        .header-icons i {
            margin-left: 20px;
            font-size: 18px;
            cursor: pointer;
        }

        /* Botón de refresh específico */
        .refresh-comments {
            background: none;
            border: none;
            color: #d1d7db;
            font-size: 18px;
            margin-left: 15px;
            cursor: pointer;
        }

        .messages-area {
            flex: 1;
            background-color: #0b141a;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #disqus_thread {
            background-color: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            width: 100%;
            height: 100%;
            overflow-y: auto;
            min-height: 300px; /* Asegura altura en móviles */
        }

        .chat-footer {
            background-color: #202c33;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            color: #8796a1;
        }

        .chat-footer i {
            font-size: 24px;
            margin-right: 15px;
            cursor: pointer;
        }

        .chat-footer .message-input {
            flex: 1;
            background-color: #2a3942;
            border: none;
            border-radius: 8px;
            padding: 9px 12px;
            color: #d1d7db;
            outline: none;
        }

        .chat-footer .message-input::placeholder {
            color: #8796a1;
        }

        /* Scroll personalizado */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #2f3b43;
            border-radius: 10px;
        }

        /* ========== MEDIA QUERIES PARA MÓVILES ========== */
        @media screen and (max-width: 768px) {
            body {
                padding: 0;
            }
            .whatsapp-container {
                flex-direction: column;
                height: 100vh;
                border-radius: 0;
                max-width: 100%;
            }
            .sidebar, .chat-panel {
                width: 100%;
            }
            .sidebar {
                height: 40%; /* Ajustable, puedes cambiarlo */
                border-right: none;
                border-bottom: 1px solid #2f3b43;
            }
            .chat-panel {
                height: 60%;
            }
            .sidebar-header, .chat-header {
                padding: 8px 12px;
            }
            .header-icons i {
                margin-left: 15px;
                font-size: 16px;
            }
            .contact-avatar {
                width: 35px;
                height: 35px;
                font-size: 14px;
            }
            .contact-details h4 {
                font-size: 14px;
            }
            .contact-details p {
                font-size: 11px;
            }
            .chat-footer i {
                font-size: 20px;
                margin-right: 10px;
            }
            .chat-footer .message-input {
                padding: 6px 10px;
                font-size: 14px;
            }
            .messages-area {
                padding: 10px;
            }
            #disqus_thread {
                padding: 10px;
            }
        }

        /* Ajuste para pantallas muy pequeñas */
        @media screen and (max-width: 480px) {
            .sidebar {
                height: 35%;
            }
            .chat-panel {
                height: 65%;
            }
            .chat-avatar {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }
            .chat-name {
                font-size: 14px;
            }
            .chat-message {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="whatsapp-container">
        <!-- Panel izquierdo -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="avatar">Yo</div>
                <div class="header-icons">
                    <i class="fas fa-circle-notch"></i>
                    <i class="fas fa-message"></i>
                    <i class="fas fa-ellipsis-vertical"></i>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Busca un chat o inicia uno nuevo">
            </div>
            <div class="chats-list">
                <div class="chat-item active">
                    <div class="chat-avatar">JD</div>
                    <div class="chat-info">
                        <div class="chat-name">Juan Díaz</div>
                        <div class="chat-message">¿Unas Marácas?</div>
                    </div>
                    <div class="chat-time">ayer</div>
                </div>
                <div class="chat-item">
                    <div class="chat-avatar">ML</div>
                    <div class="chat-info">
                        <div class="chat-name">María López</div>
                        <div class="chat-message">Sale Pete?</div>
                    </div>
                    <div class="chat-time">12:45</div>
                </div>
                <div class="chat-item">
                    <div class="chat-avatar">CG</div>
                    <div class="chat-info">
                        <div class="chat-name">ComeTravas</div>
                        <div class="chat-message">Nos vemos mañana?</div>
                    </div>
                    <div class="chat-time">lun</div>
                </div>
            </div>
        </div>

        <!-- Panel derecho con Disqus -->
        <div class="chat-panel">
            <div class="chat-header">
                <div class="contact-info">
                    <div class="contact-avatar">JD</div>
                    <div class="contact-details">
                        <h4>Juan Díaz</h4>
                        <p>en línea</p>
                    </div>
                </div>
                <div class="header-icons">
                    <i class="fas fa-search"></i>
                    <i class="fas fa-paperclip"></i>
                    <!-- Botón de refresh manual para Disqus -->
                    <button class="refresh-comments" id="refreshDisqusBtn" title="Actualizar comentarios">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <i class="fas fa-ellipsis-vertical"></i>
                </div>
            </div>

            <!-- Área de mensajes: Disqus -->
            <div class="messages-area">
                <div id="disqus_thread"></div>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </div>

            <!-- Pie simulado (decorativo) -->
            <div class="chat-footer">
                <i class="fa-regular fa-face-smile"></i>
                <i class="fa-solid fa-paperclip"></i>
                <input type="text" class="message-input" placeholder="Escribe un mensaje aquí (solo decoración)">
                <i class="fa-solid fa-microphone"></i>
            </div>
        </div>
    </div>

    <script>
        // Configuración centralizada para Disqus
        var disqusConfig = {
            url: window.location.href,
            identifier: 'whatsapp-chat-juan'
        };

        // Variable para controlar el intervalo
        var disqusAutoRefreshInterval;

        // Función para refrescar Disqus manual o automáticamente
        function refreshDisqus() {
            if (typeof DISQUS !== 'undefined') {
                DISQUS.reset({
                    reload: true,
                    config: function () {
                        this.page.url = disqusConfig.url;
                        this.page.identifier = disqusConfig.identifier;
                    }
                });
                console.log('Disqus refrescado');
            } else {
                console.warn('Disqus aún no está cargado');
            }
        }

        // Configuración de Disqus (se ejecuta antes de cargar el script)
        var disqus_config = function () {
            this.page.url = disqusConfig.url;
            this.page.identifier = disqusConfig.identifier;
        };

        // Cargar script de Disqus
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://penatotal-1.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();

        // Una vez cargada la página, activamos el botón y el auto-refresh
        window.addEventListener('load', function() {
            // Botón manual
            document.getElementById('refreshDisqusBtn').addEventListener('click', function(e) {
                e.preventDefault();
                refreshDisqus();
            });

            // Auto-refresh cada 30 segundos (30000 ms)
            // Puedes cambiar el intervalo o desactivarlo si lo deseas
            disqusAutoRefreshInterval = setInterval(refreshDisqus, 30000);
        });

        // Opcional: limpiar el intervalo si se descarga la página (buena práctica)
        window.addEventListener('beforeunload', function() {
            if (disqusAutoRefreshInterval) {
                clearInterval(disqusAutoRefreshInterval);
            }
        });
    </script>
</body>
</html>
